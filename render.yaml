services:
  - type: worker
    name: planner-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///planner_bot.db
      - key: LOG_LEVEL
        value: INFO
